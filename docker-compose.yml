services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: facilcomanda
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d facilcomanda"]
      interval: 5s
      timeout: 5s
      retries: 20
  postgres-init:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./docker/postgres/init-databases.sh:/init-databases.sh:ro
    entrypoint: ["/bin/sh", "/init-databases.sh"]
    depends_on:
      postgres:
        condition: service_healthy
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
  discovery-server:
    build:
      context: .
      args:
        SERVICE: discovery-server
    ports:
      - "8761:8761"
  config-server:
    build:
      context: .
      args:
        SERVICE: config-server
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
    depends_on:
      - discovery-server
    ports:
      - "8888:8888"
  api-gateway:
    build:
      context: .
      args:
        SERVICE: api-gateway
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
    depends_on:
      - config-server
      - discovery-server
    ports:
      - "8080:8080"

  auth-service:
    build:
      context: .
      args:
        SERVICE: auth-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      DB_URL: jdbc:postgresql://postgres:5432/auth_service
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
    depends_on:
      config-server:
        condition: service_started
      discovery-server:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
    ports:
      - "8081:8081"

  user-service:
