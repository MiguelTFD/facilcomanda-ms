spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates: [ Path=/api/auth/** ]
        - id: user-service
          uri: lb://user-service
          predicates: [ Path=/api/users/**,/api/roles/** ]
        - id: category-service
          uri: lb://category-service
          predicates: [ Path=/api/categories/** ]
        - id: product-service
          uri: lb://product-service
          predicates: [ Path=/api/products/** ]
        - id: restaurant-service
          uri: lb://restaurant-service
          predicates: [ Path=/api/organizations/**,/api/restaurant-floors/** ]
        - id: table-service
          uri: lb://table-service
          predicates: [ Path=/api/tables/** ]
        - id: order-service
          uri: lb://order-service
          predicates: [ Path=/api/orders/** ]
        - id: audit-service
          uri: lb://audit-service
          predicates: [ Path=/api/audit/** ]
server:
  port: ${PORT:8080}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
management:
  endpoints:
    web:
      exposure:
        include: health,info
